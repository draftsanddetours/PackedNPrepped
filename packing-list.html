<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packed N Prepped | Packing List</title>
    <meta
      name="description"
      content="A printable packing checklist with clothing, shoes, toiletries, documents, electronics, and easy-to-forget items."

    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css?v=7" />

    <main class="post-shell">
      <a class="back-link" href="index.html#all-lists">Back to All Lists</a>

        <img id="post-hero-image" alt="Packing list travel scene" />

        <div class="forgotten-grid" id="post-forgotten"></div>

    <script type="module" src="/src/post.ts"></script>
